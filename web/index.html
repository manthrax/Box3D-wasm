<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Box3D Web Samples</title>
	<link rel="stylesheet" href="./styles.css">
</head>
<body>
	<div class="app-shell">
		<canvas id="viewport"></canvas>
		<aside class="panel">
			<div class="panel-handle" id="panel-handle">
				<div>
					<div class="eyebrow">Box3D WebAssembly</div>
					<h1>Keys: drag, R, P, -, =</h1>
				</div>
				<button id="panel-toggle" type="button" aria-label="Toggle panel">-</button>
			</div>
			<div class="panel-body" id="panel-body">
				<p class="lede">
					Drag the header to move this panel. Press R to restart, P to pause, and - / = to switch samples.
				</p>
				<label class="field">
					<span>Search</span>
					<input id="sample-search" type="search" placeholder="Filter samples..." autocomplete="off" spellcheck="false">
				</label>
				<label class="field">
					<span>Sample</span>
					<select id="sample-select"></select>
				</label>
				<label class="field">
					<span>Workers</span>
					<input id="worker-count" type="number" min="1" step="1" inputmode="numeric">
				</label>
				<div id="worker-support-note" class="support-note" hidden></div>
				<div class="button-row">
					<button id="restart-button" type="button">Restart</button>
					<button id="pause-button" type="button">Pause</button>
					<button id="step-button" type="button">Step</button>
				</div>
				<div id="custom-ui" class="custom-ui"></div>
				<section>
					<h2>Status</h2>
					<div id="status-lines" class="status-lines"></div>
				</section>
				<section>
					<h2>Notes</h2>
					<div id="sample-description" class="notes"></div>
				</section>
			</div>
		</aside>
	</div>
	<script type="module" src="./app.js"></script>
</body>
</html>
